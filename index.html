<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Advantage 2002 · Pre-Algebra</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --panel: #0f1628;
    --card: #141c35;
    --border: #1e3a6e;
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --accent3: #f59e0b;
    --success: #10b981;
    --danger: #ef4444;
    --text: #e2e8f0;
    --muted: #64748b;
    --glow: 0 0 20px rgba(0,212,255,0.3);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Exo 2', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── STARFIELD ── */
  #stars {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background: radial-gradient(ellipse at 20% 50%, #0d1b3e 0%, #0a0e1a 60%);
  }
  .star { position: absolute; border-radius: 50%; background: white; animation: twinkle var(--d) ease-in-out infinite; opacity: 0; }
  @keyframes twinkle { 0%,100%{opacity:0} 50%{opacity:var(--o)} }

  /* ── SCREENS ── */
  .screen { display: none; position: relative; z-index: 1; }
  .screen.active { display: block; }

  /* ── INTRO SCREEN ── */
  #screen-intro {
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 2rem;
  }
  #screen-intro.active { display: flex; }

  .logo-badge {
    border: 2px solid var(--accent);
    border-radius: 12px;
    padding: 0.4rem 1.2rem;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    color: var(--accent);
    letter-spacing: 4px;
    margin-bottom: 2rem;
    box-shadow: var(--glow);
    animation: pulse-border 2s ease-in-out infinite;
  }
  @keyframes pulse-border { 0%,100%{box-shadow:0 0 10px rgba(0,212,255,0.3)} 50%{box-shadow:0 0 30px rgba(0,212,255,0.7)} }

  .main-title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(2.5rem, 8vw, 5rem);
    font-weight: 900;
    line-height: 1;
    background: linear-gradient(135deg, #00d4ff 0%, #7c3aed 50%, #f59e0b 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 0.5rem;
    animation: shimmer 3s linear infinite;
  }
  @keyframes shimmer { 0%{filter:hue-rotate(0deg)} 100%{filter:hue-rotate(360deg)} }

  .sub-title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1rem, 3vw, 1.8rem);
    color: var(--accent3);
    letter-spacing: 3px;
    margin-bottom: 3rem;
  }

  .intro-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem;
    max-width: 500px;
    width: 100%;
    margin-bottom: 2rem;
  }

  label.field-label {
    display: block;
    font-size: 0.75rem;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 0.5rem;
    text-transform: uppercase;
  }

  input[type="text"] {
    width: 100%; padding: 0.8rem 1rem;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text);
    font-family: 'Exo 2', sans-serif; font-size: 1rem;
    outline: none; transition: border-color 0.2s, box-shadow 0.2s;
  }
  input[type="text"]:focus { border-color: var(--accent); box-shadow: var(--glow); }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none; color: white;
    font-family: 'Orbitron', monospace; font-weight: 700;
    font-size: 0.9rem; letter-spacing: 2px;
    padding: 1rem 3rem; border-radius: 8px;
    cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
    margin-top: 1.5rem; width: 100%;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(124,58,237,0.5); }
  .btn-primary:active { transform: translateY(0); }

  /* ── MODULES SCREEN ── */
  #screen-modules { min-height: 100vh; padding: 2rem; }
  #screen-modules.active { display: block; }

  .top-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 3rem; padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap; gap: 1rem;
  }
  .top-bar-title {
    font-family: 'Orbitron', monospace; font-size: 1rem;
    color: var(--accent); letter-spacing: 2px;
  }
  .user-badge {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 20px; padding: 0.4rem 1rem;
    font-size: 0.85rem; color: var(--muted);
  }
  .user-badge span { color: var(--accent3); font-weight: 600; }

  .section-heading {
    font-family: 'Orbitron', monospace; font-size: 0.7rem;
    letter-spacing: 4px; color: var(--muted); text-transform: uppercase;
    margin-bottom: 1.5rem;
  }

  .modules-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1.5rem; margin-bottom: 3rem;
  }

  .module-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px; padding: 1.5rem;
    cursor: pointer; transition: all 0.2s;
    position: relative; overflow: hidden;
  }
  .module-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: var(--accent-color, var(--accent));
    transform: scaleX(0); transform-origin: left;
    transition: transform 0.3s;
  }
  .module-card:hover::before { transform: scaleX(1); }
  .module-card:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 8px 30px rgba(0,0,0,0.4); }

  .module-icon { font-size: 2rem; margin-bottom: 0.8rem; }
  .module-num { font-family: 'Share Tech Mono', monospace; font-size: 0.7rem; color: var(--muted); margin-bottom: 0.3rem; }
  .module-name { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; }
  .module-desc { font-size: 0.82rem; color: var(--muted); line-height: 1.5; margin-bottom: 1rem; }
  .module-progress-bar { height: 4px; background: var(--card); border-radius: 2px; overflow: hidden; }
  .module-progress-fill { height: 100%; background: var(--accent-color, var(--accent)); border-radius: 2px; transition: width 0.5s; }
  .module-progress-label { font-size: 0.72rem; color: var(--muted); margin-top: 0.4rem; }

  /* ── CHAPTER SCREEN ── */
  #screen-chapters { min-height: 100vh; padding: 2rem; }
  #screen-chapters.active { display: block; }

  .back-btn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    font-family: 'Exo 2', sans-serif; padding: 0.5rem 1rem;
    border-radius: 6px; cursor: pointer; font-size: 0.85rem;
    transition: all 0.2s; margin-bottom: 2rem; display: inline-flex; align-items: center; gap: 0.5rem;
  }
  .back-btn:hover { border-color: var(--accent); color: var(--accent); }

  .chapter-header {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 16px; padding: 2rem; margin-bottom: 2rem;
    display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap;
  }
  .chapter-icon-big { font-size: 3.5rem; }
  .chapter-title-area h2 { font-family: 'Orbitron', monospace; font-size: 1.3rem; margin-bottom: 0.3rem; }
  .chapter-title-area p { color: var(--muted); font-size: 0.9rem; }

  .chapters-list { display: flex; flex-direction: column; gap: 1rem; }

  .chapter-item {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 1.2rem 1.5rem;
    display: flex; align-items: center; gap: 1rem;
    cursor: pointer; transition: all 0.2s;
  }
  .chapter-item:hover { border-color: var(--accent); background: var(--card); }
  .chapter-item.locked { opacity: 0.5; cursor: not-allowed; }
  .chapter-item.completed { border-color: var(--success); }

  .chapter-num-badge {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--card); border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Orbitron', monospace; font-size: 0.8rem; font-weight: 700;
    flex-shrink: 0;
  }
  .chapter-item.completed .chapter-num-badge { background: var(--success); border-color: var(--success); color: white; }
  .chapter-info { flex: 1; }
  .chapter-info h4 { font-size: 0.95rem; font-weight: 600; margin-bottom: 0.2rem; }
  .chapter-info p { font-size: 0.8rem; color: var(--muted); }
  .chapter-status { font-size: 0.75rem; color: var(--muted); }
  .chapter-item.completed .chapter-status { color: var(--success); }

  /* ── LESSON SCREEN ── */
  #screen-lesson { min-height: 100vh; padding: 2rem; max-width: 900px; margin: 0 auto; }
  #screen-lesson.active { display: block; }

  .lesson-breadcrumb { font-size: 0.8rem; color: var(--muted); margin-bottom: 1.5rem; }
  .lesson-breadcrumb span { color: var(--accent); }

  .lesson-card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 20px; padding: 2.5rem; margin-bottom: 2rem;
  }

  .lesson-tag {
    display: inline-block; background: rgba(0,212,255,0.1);
    border: 1px solid rgba(0,212,255,0.3); border-radius: 20px;
    padding: 0.2rem 0.8rem; font-size: 0.7rem; color: var(--accent);
    letter-spacing: 2px; text-transform: uppercase; margin-bottom: 1rem;
  }

  .lesson-card h2 { font-family: 'Orbitron', monospace; font-size: 1.5rem; margin-bottom: 1.5rem; }

  .lesson-body { font-size: 1rem; line-height: 1.8; color: #cbd5e1; }
  .lesson-body p { margin-bottom: 1rem; }
  .lesson-body strong { color: var(--accent3); }

  .concept-box {
    background: var(--card); border-left: 4px solid var(--accent);
    border-radius: 0 8px 8px 0; padding: 1rem 1.5rem;
    margin: 1.5rem 0; font-size: 0.95rem;
  }
  .concept-box .label { font-size: 0.7rem; letter-spacing: 2px; color: var(--accent); margin-bottom: 0.3rem; }

  .example-box {
    background: rgba(124,58,237,0.1); border: 1px solid rgba(124,58,237,0.3);
    border-radius: 8px; padding: 1.2rem 1.5rem; margin: 1.5rem 0;
  }
  .example-box .label { font-size: 0.7rem; letter-spacing: 2px; color: var(--accent2); margin-bottom: 0.5rem; }
  .math-line {
    font-family: 'Share Tech Mono', monospace; font-size: 1.1rem;
    color: var(--accent3); line-height: 2; display: block;
  }

  .step-box { margin: 1.5rem 0; }
  .step-box .step {
    display: flex; gap: 1rem; margin-bottom: 0.8rem; align-items: flex-start;
  }
  .step-num {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--accent2); color: white;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem; font-weight: 700; flex-shrink: 0; margin-top: 2px;
  }
  .step-text { font-size: 0.92rem; line-height: 1.6; color: #cbd5e1; }

  .continue-btn {
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none; color: white;
    font-family: 'Orbitron', monospace; font-weight: 700;
    font-size: 0.85rem; letter-spacing: 2px;
    padding: 0.9rem 2.5rem; border-radius: 8px;
    cursor: pointer; transition: all 0.15s;
  }
  .continue-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(124,58,237,0.5); }

  /* ── QUIZ SCREEN ── */
  #screen-quiz { min-height: 100vh; padding: 2rem; max-width: 800px; margin: 0 auto; }
  #screen-quiz.active { display: block; }

  .quiz-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem;
  }
  .quiz-progress-text { font-family: 'Share Tech Mono', monospace; font-size: 0.85rem; color: var(--muted); }
  .quiz-progress-track { height: 6px; background: var(--card); border-radius: 3px; overflow: hidden; margin-bottom: 2rem; }
  .quiz-progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent2), var(--accent)); border-radius: 3px; transition: width 0.4s; }

  .question-card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 20px; padding: 2.5rem; margin-bottom: 1.5rem;
  }
  .question-num { font-size: 0.7rem; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 1rem; }
  .question-text { font-size: 1.15rem; font-weight: 600; line-height: 1.6; margin-bottom: 0.5rem; }
  .question-math { font-family: 'Share Tech Mono', monospace; font-size: 1.4rem; color: var(--accent3); margin: 1rem 0; }

  .answers-grid { display: flex; flex-direction: column; gap: 0.75rem; }

  .answer-btn {
    background: var(--card); border: 2px solid var(--border);
    border-radius: 10px; padding: 1rem 1.5rem;
    text-align: left; cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; gap: 1rem;
    font-family: 'Exo 2', sans-serif; font-size: 0.95rem; color: var(--text);
  }
  .answer-btn:hover:not(:disabled) { border-color: var(--accent); background: rgba(0,212,255,0.05); }
  .answer-label {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--panel); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Orbitron', monospace; font-size: 0.75rem; font-weight: 700;
    flex-shrink: 0; transition: all 0.2s;
  }
  .answer-btn:hover:not(:disabled) .answer-label { background: var(--accent2); border-color: var(--accent2); color: white; }
  .answer-btn.correct { border-color: var(--success); background: rgba(16,185,129,0.1); }
  .answer-btn.correct .answer-label { background: var(--success); border-color: var(--success); color: white; }
  .answer-btn.wrong { border-color: var(--danger); background: rgba(239,68,68,0.1); }
  .answer-btn.wrong .answer-label { background: var(--danger); border-color: var(--danger); color: white; }
  .answer-btn:disabled { cursor: default; }

  .feedback-box {
    border-radius: 10px; padding: 1rem 1.5rem;
    font-size: 0.9rem; line-height: 1.5; margin-top: 1rem;
    display: none;
  }
  .feedback-box.show { display: block; }
  .feedback-box.correct { background: rgba(16,185,129,0.1); border: 1px solid var(--success); color: #6ee7b7; }
  .feedback-box.wrong { background: rgba(239,68,68,0.1); border: 1px solid var(--danger); color: #fca5a5; }

  .next-btn {
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none; color: white;
    font-family: 'Orbitron', monospace; font-weight: 700;
    font-size: 0.85rem; letter-spacing: 2px;
    padding: 0.9rem 2.5rem; border-radius: 8px;
    cursor: pointer; transition: all 0.15s;
    display: none; margin-top: 1.5rem;
  }
  .next-btn.show { display: inline-block; }
  .next-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(124,58,237,0.5); }

  /* ── RESULTS SCREEN ── */
  #screen-results { min-height: 100vh; padding: 2rem; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
  #screen-results.active { display: flex; }

  .score-ring {
    width: 160px; height: 160px;
    border-radius: 50%; margin: 0 auto 2rem;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    border: 4px solid var(--accent);
    box-shadow: 0 0 40px rgba(0,212,255,0.3);
    position: relative;
  }
  .score-pct { font-family: 'Orbitron', monospace; font-size: 2.5rem; font-weight: 900; color: var(--accent); }
  .score-label { font-size: 0.7rem; letter-spacing: 2px; color: var(--muted); }

  .results-title { font-family: 'Orbitron', monospace; font-size: 1.8rem; margin-bottom: 0.5rem; }
  .results-sub { color: var(--muted); margin-bottom: 2rem; }

  .results-card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 16px; padding: 2rem; max-width: 480px; width: 100%; margin-bottom: 2rem;
  }
  .results-stat { display: flex; justify-content: space-between; padding: 0.6rem 0; border-bottom: 1px solid var(--border); }
  .results-stat:last-child { border-bottom: none; }
  .results-stat .key { color: var(--muted); font-size: 0.9rem; }
  .results-stat .val { font-weight: 700; }
  .val.good { color: var(--success); }
  .val.bad { color: var(--danger); }

  .btn-row { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }

  .btn-secondary {
    background: var(--card); border: 1px solid var(--border);
    color: var(--text); font-family: 'Orbitron', monospace;
    font-size: 0.8rem; letter-spacing: 1px;
    padding: 0.8rem 1.8rem; border-radius: 8px;
    cursor: pointer; transition: all 0.15s;
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

  /* ── REPORT CARD ── */
  #screen-report { min-height: 100vh; padding: 2rem; max-width: 800px; margin: 0 auto; }
  #screen-report.active { display: block; }

  .report-table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
  .report-table th {
    background: var(--card); padding: 0.8rem 1rem;
    text-align: left; font-size: 0.75rem; letter-spacing: 2px;
    color: var(--muted); text-transform: uppercase; border-bottom: 1px solid var(--border);
  }
  .report-table td { padding: 0.8rem 1rem; border-bottom: 1px solid rgba(30,58,110,0.3); font-size: 0.9rem; }
  .report-table tr:hover td { background: rgba(255,255,255,0.02); }
  .grade-badge {
    display: inline-block; padding: 0.2rem 0.6rem; border-radius: 4px;
    font-family: 'Share Tech Mono', monospace; font-size: 0.85rem; font-weight: 700;
  }
  .grade-A { background: rgba(16,185,129,0.15); color: var(--success); }
  .grade-B { background: rgba(0,212,255,0.1); color: var(--accent); }
  .grade-C { background: rgba(245,158,11,0.15); color: var(--accent3); }
  .grade-F { background: rgba(239,68,68,0.1); color: var(--danger); }

  /* NAV */
  .side-nav {
    position: fixed; bottom: 2rem; right: 2rem; z-index: 100;
    display: flex; flex-direction: column; gap: 0.5rem;
  }
  .nav-btn {
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--panel); border: 1px solid var(--border);
    color: var(--muted); font-size: 1.1rem;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.2s;
  }
  .nav-btn:hover { border-color: var(--accent); color: var(--accent); box-shadow: var(--glow); }

  /* TOAST */
  #toast {
    position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px);
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 0.8rem 1.5rem;
    font-size: 0.9rem; transition: transform 0.3s; z-index: 999;
    pointer-events: none;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  @media(max-width:600px) {
    .lesson-card, .question-card { padding: 1.5rem; }
    .module-card { padding: 1.2rem; }
  }
</style>
</head>
<body>

<canvas id="stars"></canvas>

<!-- ────────────────────────────────────────
     INTRO SCREEN
──────────────────────────────────────── -->
<div id="screen-intro" class="screen active">
  <div class="logo-badge">BREAKWATER SOFTWARE · RESEARCH GROUP</div>
  <h1 class="main-title">MATH<br>ADVANTAGE</h1>
  <p class="sub-title">PRE-ALGEBRA · 2002</p>
  <div class="intro-card">
    <label class="field-label">Enter Your Name</label>
    <input type="text" id="student-name" placeholder="Student Name" maxlength="30" />
    <button class="btn-primary" onclick="startApp()">▶ LAUNCH PROGRAM</button>
  </div>
  <p style="color:var(--muted);font-size:0.8rem;">Web Edition · All modules unlocked</p>
</div>

<!-- ────────────────────────────────────────
     MODULES SCREEN
──────────────────────────────────────── -->
<div id="screen-modules" class="screen">
  <div class="top-bar">
    <div class="top-bar-title">★ MATH ADVANTAGE · PRE-ALGEBRA</div>
    <div class="user-badge">Student: <span id="display-name">—</span></div>
    <button class="nav-btn" onclick="showReport()" style="position:static;width:auto;border-radius:8px;padding:0 1rem;font-size:0.8rem;letter-spacing:1px;font-family:'Orbitron',monospace;" title="Report Card">📋 REPORT CARD</button>
  </div>
  <p class="section-heading">// SELECT A MODULE TO BEGIN</p>
  <div class="modules-grid" id="modules-grid"></div>
</div>

<!-- ────────────────────────────────────────
     CHAPTERS SCREEN
──────────────────────────────────────── -->
<div id="screen-chapters" class="screen">
  <div style="max-width:700px;margin:0 auto;padding-top:1rem;">
    <button class="back-btn" onclick="showScreen('modules')">← Back to Modules</button>
    <div class="chapter-header" id="chapter-header"></div>
    <p class="section-heading">// CHAPTERS</p>
    <div class="chapters-list" id="chapters-list"></div>
  </div>
</div>

<!-- ────────────────────────────────────────
     LESSON SCREEN
──────────────────────────────────────── -->
<div id="screen-lesson" class="screen">
  <div class="lesson-breadcrumb" id="lesson-breadcrumb"></div>
  <div id="lesson-content"></div>
  <button class="continue-btn" id="lesson-continue-btn" onclick="startQuiz()">START QUIZ →</button>
</div>

<!-- ────────────────────────────────────────

          {q:'What is the median of: 3, 5, 7, 9, 11?', a:['7','5','9','6'], correct:0, explanation:'The middle value of 5 ordered numbers is the 3rd one: 7.'},
          {q:'Data: 2, 4, 4, 6, 8, 4. What is the mode?', a:['4','6','2','8'], correct:0, explanation:'4 appears three times — more than any other value.'},
          {q:'What is the range of: 15, 3, 22, 8, 11?', a:['19','8','22','15'], correct:0, explanation:'Range = largest − smallest = 22 − 3 = 19.'},
          {q:'A student scores 70, 80, 90, and 100. What score on the 5th test gives a mean of 85?', a:['85','75','90','95'], correct:0, explanation:'Target sum = 85 × 5 = 425. Current sum = 340. Fifth score = 425 − 340 = 85.'},
        ]
      }
    ]
  },
];

// ────────────────────────────────────────
//  STATE
// ────────────────────────────────────────
let state = {
  studentName: '',
  progress: {},   // { moduleId_chapterIdx: { completed, score, total } }
  currentModule: null,
  currentChapterIdx: null,
  quiz: { questions:[], current:0, correct:0, answers:[] }
};

function getKey(mid, cidx) { return `${mid}_${cidx}`; }

function getModuleProgress(mod) {
  let done=0, total=mod.chapters.length;
  mod.chapters.forEach((_,i)=>{ if(state.progress[getKey(mod.id,i)]?.completed) done++; });
  return {done,total};
}

// ────────────────────────────────────────
//  SCREENS
// ────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
  window.scrollTo(0,0);
}

// ────────────────────────────────────────
//  INTRO
// ────────────────────────────────────────
function startApp() {
  const n = document.getElementById('student-name').value.trim();
  state.studentName = n || 'Student';
  document.getElementById('display-name').textContent = state.studentName;
  buildModulesGrid();
  showScreen('modules');
}
document.getElementById('student-name').addEventListener('keydown', e=>{ if(e.key==='Enter') startApp(); });

// ────────────────────────────────────────
//  MODULES
// ────────────────────────────────────────
function buildModulesGrid() {
  const grid = document.getElementById('modules-grid');
  grid.innerHTML = '';
  MODULES.forEach(mod => {
    const {done,total} = getModuleProgress(mod);
    const pct = total>0 ? Math.round(done/total*100) : 0;
    const card = document.createElement('div');
    card.className = 'module-card';
    card.style.setProperty('--accent-color', mod.color);
    card.innerHTML = `
      <div class="module-icon">${mod.icon}</div>
      <div class="module-num">MODULE ${String(MODULES.indexOf(mod)+1).padStart(2,'0')}</div>
      <div class="module-name">${mod.name}</div>
      <div class="module-desc">${mod.desc}</div>
      <div class="module-progress-bar"><div class="module-progress-fill" style="width:${pct}%;background:${mod.color}"></div></div>
      <div class="module-progress-label">${done}/${total} chapters complete</div>
    `;
    card.onclick = () => openModule(mod);
    grid.appendChild(card);
  });
}

// ────────────────────────────────────────
//  CHAPTERS
// ────────────────────────────────────────
function openModule(mod) {
  state.currentModule = mod;
  document.getElementById('chapter-header').innerHTML = `
    <div class="chapter-icon-big">${mod.icon}</div>
    <div class="chapter-title-area">
      <h2>${mod.name}</h2>
      <p>${mod.desc}</p>
    </div>
  `;
  const list = document.getElementById('chapters-list');
  list.innerHTML = '';
  mod.chapters.forEach((ch,i) => {
    const key = getKey(mod.id,i);
    const prog = state.progress[key];
    const completed = prog?.completed;
    const div = document.createElement('div');
    div.className = `chapter-item${completed?' completed':''}`;
    div.innerHTML = `
      <div class="chapter-num-badge">${completed?'✓':String(i+1).padStart(2,'0')}</div>
      <div class="chapter-info">
        <h4>${ch.title}</h4>
        <p>${ch.topics}</p>
      </div>
      <div class="chapter-status">${completed?`✓ ${prog.score}/${prog.total}`:'→ Start'}</div>
    `;
    div.onclick = () => openChapter(mod, i);
    list.appendChild(div);
  });
  showScreen('chapters');
}

// ────────────────────────────────────────
//  LESSON
// ────────────────────────────────────────
function openChapter(mod, idx) {
  state.currentModule = mod;
  state.currentChapterIdx = idx;
  const ch = mod.chapters[idx];

  document.getElementById('lesson-breadcrumb').innerHTML =
    `${mod.icon} ${mod.name} <span>›</span> Chapter ${idx+1}: ${ch.title}`;

  document.getElementById('lesson-content').innerHTML = `
    <div class="lesson-card">
      <div class="lesson-tag">// TUTORIAL</div>
      <h2>${ch.title}</h2>
      <div class="lesson-body">${ch.content}</div>
    </div>
  `;
  showScreen('lesson');
}

// ────────────────────────────────────────
//  QUIZ
// ────────────────────────────────────────
function startQuiz() {
  const mod = state.currentModule;
  const ch = mod.chapters[state.currentChapterIdx];
  state.quiz = { questions: ch.questions, current:0, correct:0, answers:[] };
  document.getElementById('quiz-chapter-label').textContent = `${mod.icon} ${mod.name} · ${ch.title}`;
  renderQuestion();
  showScreen('quiz');
}

function renderQuestion() {
  const {questions, current, correct} = state.quiz;
  const total = questions.length;
  const q = questions[current];

  document.getElementById('quiz-progress-text').textContent = `Question ${current+1} of ${total}`;
  document.getElementById('quiz-score-live').textContent = `${correct} / ${current}`;
  document.getElementById('quiz-progress-fill').style.width = `${(current/total)*100}%`;

  const labels = ['A','B','C','D'];
  const area = document.getElementById('quiz-question-area');
  area.innerHTML = `
    <div class="question-card">
      <div class="question-num">QUESTION ${String(current+1).padStart(2,'0')}</div>
      <div class="question-text">${q.q}</div>
      <div class="answers-grid" id="answers-grid">
        ${q.a.map((ans,i)=>`
          <button class="answer-btn" onclick="selectAnswer(${i})">
            <div class="answer-label">${labels[i]}</div>
            <span>${ans}</span>
          </button>
        `).join('')}
      </div>
      <div class="feedback-box" id="feedback"></div>
    </div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">${current+1<total?'NEXT QUESTION →':'SEE RESULTS →'}</button>
  `;
}

function selectAnswer(idx) {
  const q = state.quiz.questions[state.quiz.current];
  const btns = document.querySelectorAll('.answer-btn');
  const feedback = document.getElementById('feedback');

  btns.forEach(b=>b.disabled=true);
  state.quiz.answers.push(idx);

  if(idx === q.correct) {
    btns[idx].classList.add('correct');
    state.quiz.correct++;
    feedback.className='feedback-box correct show';
    feedback.textContent = '✓ Correct! ' + q.explanation;
  } else {
    btns[idx].classList.add('wrong');
    btns[q.correct].classList.add('correct');
    feedback.className='feedback-box wrong show';
    feedback.textContent = '✗ Not quite. ' + q.explanation;
  }

  const nextBtn = document.getElementById('next-btn');
  nextBtn.classList.add('show');
  document.getElementById('quiz-score-live').textContent = `${state.quiz.correct} / ${state.quiz.current+1}`;
}

function nextQuestion() {
  state.quiz.current++;
  if(state.quiz.current >= state.quiz.questions.length) {
    finishQuiz();
  } else {
    renderQuestion();
  }
}

// ────────────────────────────────────────
//  RESULTS
// ────────────────────────────────────────
function finishQuiz() {
  const {correct, questions} = state.quiz;
  const total = questions.length;
  const pct = Math.round(correct/total*100);
  const mod = state.currentModule;
  const chIdx = state.currentChapterIdx;
  const ch = mod.chapters[chIdx];

  const key = getKey(mod.id, chIdx);
  const prev = state.progress[key];
  if(!prev || pct > (prev.score/prev.total*100)) {
    state.progress[key] = { completed:true, score:correct, total };
  }
  buildModulesGrid();

  const grade = pct>=90?'A':pct>=80?'B':pct>=70?'C':pct>=60?'D':'F';
  const msg = pct>=90?'Outstanding! 🌟':pct>=70?'Well done! 👍':pct>=50?'Good effort. Keep practicing! 💪':'Review the lesson and try again. 📖';

  const rc = document.getElementById('results-content');
  rc.innerHTML = `
    <div class="score-ring">
      <div class="score-pct">${pct}%</div>
      <div class="score-label">SCORE</div>
    </div>
    <div class="results-title">${grade === 'A' || grade === 'B' ? 'Chapter Complete!' : 'Quiz Done'}</div>
    <p class="results-sub">${msg}</p>
    <div class="results-card">
      <div class="results-stat"><span class="key">Chapter</span><span class="val">${ch.title}</span></div>
      <div class="results-stat"><span class="key">Correct Answers</span><span class="val good">${correct}</span></div>
      <div class="results-stat"><span class="key">Incorrect</span><span class="val ${total-correct>0?'bad':''}">${total-correct}</span></div>
      <div class="results-stat"><span class="key">Score</span><span class="val" style="color:${pct>=70?'var(--success)':'var(--danger)'}">${pct}%</span></div>
      <div class="results-stat"><span class="key">Grade</span><span class="val"><span class="grade-badge grade-${grade}">${grade}</span></span></div>
    </div>
    <div class="btn-row">
      <button class="btn-secondary" onclick="openChapter(state.currentModule, state.currentChapterIdx)">↺ REVIEW LESSON</button>
      <button class="btn-secondary" onclick="startQuiz()">↺ RETRY QUIZ</button>
      <button class="btn-primary" style="width:auto" onclick="openModule(state.currentModule)">NEXT CHAPTER →</button>
    </div>
  `;
  showScreen('results');
}

// ────────────────────────────────────────
//  REPORT CARD
// ────────────────────────────────────────
function showReport() {
  document.getElementById('report-student-name').textContent = state.studentName;
  let html = `<table class="report-table">
    <thead><tr><th>Module</th><th>Chapter</th><th>Score</th><th>Grade</th></tr></thead><tbody>`;

  let anyData = false;
  MODULES.forEach(mod=>{
    mod.chapters.forEach((ch,i)=>{
      const k = getKey(mod.id,i);
      const p = state.progress[k];
      if(p) {
        anyData = true;
        const pct = Math.round(p.score/p.total*100);
        const grade = pct>=90?'A':pct>=80?'B':pct>=70?'C':pct>=60?'D':'F';
        html += `<tr>
          <td>${mod.icon} ${mod.name}</td>
          <td>${ch.title}</td>
          <td>${p.score}/${p.total} (${pct}%)</td>
          <td><span class="grade-badge grade-${grade}">${grade}</span></td>
        </tr>`;
      }
    });
  });

  if(!anyData) {
    html += `<tr><td colspan="4" style="color:var(--muted);text-align:center;padding:2rem">No quizzes completed yet. Complete chapters to see your grades here.</td></tr>`;
  }

  html += '</tbody></table>';
  document.getElementById('report-content').innerHTML = html;
  showScreen('report');
}

// ────────────────────────────────────────
//  TOAST
// ────────────────────────────────────────
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

document.addEventListener('keydown', e => {
  if(e.key==='Enter' && document.getElementById('screen-intro').classList.contains('active'))
    startApp();
});
</script>
</body>
</html>
